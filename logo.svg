<svg width="200" height="120" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Логотип розы -->
  <g transform="translate(100, 30)">
    <!-- Внешние лепестки -->
    <path d="M-15,-15 Q-25,-10 -20,0 Q-25,10 -15,15 Q-10,25 0,20 Q10,25 15,15 Q25,10 20,0 Q25,-10 15,-15 Q10,-25 0,-20 Q-10,-25 -15,-15 Z" 
          fill="none" stroke="white" stroke-width="2.5" opacity="0.9"/>
    
    <!-- Средние лепестки -->
    <path d="M-10,-10 Q-15,-7 -12,0 Q-15,7 -10,10 Q-7,15 0,12 Q7,15 10,10 Q15,7 12,0 Q15,-7 10,-10 Q7,-15 0,-12 Q-7,-15 -10,-10 Z" 
          fill="none" stroke="white" stroke-width="2" opacity="0.8"/>
    
    <!-- Внутренние лепестки -->
    <path d="M-6,-6 Q-8,-4 -6,0 Q-8,4 -6,6 Q-4,8 0,6 Q4,8 6,6 Q8,4 6,0 Q8,-4 6,-6 Q4,-8 0,-6 Q-4,-8 -6,-6 Z" 
          fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Центр -->
    <circle cx="0" cy="0" r="3" fill="white" opacity="0.6"/>
  </g>
  
  <!-- Основной текст -->
  <text x="100" y="70" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold" letter-spacing="1px">
    ИДЕАЛЬНЫЙ
  </text>
  <text x="100" y="90" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold" letter-spacing="1px">
    БАЛАНС
  </text>
  
  <!-- Подпись -->
  <text x="100" y="108" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" letter-spacing="0.5px" opacity="0.8">
    ДОСТАВКА РАЦИОНОВ НА ВЕСЬ ДЕНЬ
  </text>
</svg>
