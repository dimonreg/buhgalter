server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(svg|png|jpg|jpeg|gif|ico|css|js|json)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
